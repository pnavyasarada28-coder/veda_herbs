databases:
  - name: vedaherbs-db
    databaseName: vedaherbs
    user: vedaherbs_user
    plan: free

services:
  - type: web
    name: vedaherbs
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn --chdir herbal_garden herbal_garden.wsgi:application"
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vedaherbs-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false # User will input this manually in the Render dashboard
